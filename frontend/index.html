<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1f2e" />
    <meta name="description" content="Track poker buy-ins, cash-outs, chips, and session stats." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Poker Ledger" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Poker Ledger</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("poker-ledger-theme") || "system"
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
          var dark = stored === "dark" || (stored !== "light" && prefersDark)
          document.documentElement.classList.toggle("dark", dark)
          document.documentElement.style.colorScheme = dark ? "dark" : "light"
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute("content", dark ? "#1a1d2b" : "#e4eaf5")
        } catch (e) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
