services:
  - type: web
    name: poker-ledger
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn config.wsgi --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: poker-ledger-db
          property: connectionString
      - key: CLERK_ISSUER
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

databases:
  - name: poker-ledger-db
    plan: free
